name: Deploy Arancino App
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arancini_counter # <--- DICIAMOGLI DI ENTRARE QUI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: arancini_counter/package-lock.json # Percorso per la cache
      - run: npm ci
      - run: npm run build
        env:
          VITE_SEND_EMAIL_FUNCTION_ID: ${{ secrets.VITE_SEND_EMAIL_FUNCTION_ID }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Dobbiamo caricare la cartella dist che sta DENTRO arancini_counter
          path: ./arancini_counter/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4